<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #ffffff;
            --card-bg: #f8f9fa;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #e0e0e0;
            --positive-text: #28a745;
            --negative-text: #dc3545;
            --neutral-text: #6c757d;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-color: #404040;
            --positive-text: #4ade80;
            --negative-text: #f87171;
            --neutral-text: #9ca3af;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Top Controls */
        .top-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: var(--border-color);
        }

        .theme-toggle {
            padding: 8px 12px;
            font-size: 1.2em;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* Setup Page */
        .setup-page {
            max-width: 600px;
            margin: 50px auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 40px;
        }

        .setup-page h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }

        .setup-page p {
            color: var(--text-secondary);
        }

        .setup-page ol {
            margin: 20px 0;
            padding-left: 20px;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .setup-page li {
            margin: 10px 0;
        }

        .setup-page a {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .api-input-group {
            margin: 30px 0;
        }

        .api-input-group input {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 15px;
            background: var(--bg-color);
            color: var(--text-primary);
        }

        .api-input-group input:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--text-primary);
            color: var(--bg-color);
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            opacity: 0.8;
        }

        /* Currency Options */
        .currency-options {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            margin-top: 60px;
        }

        .currency-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .currency-header h3 {
            color: var(--text-primary);
            font-size: 1.1em;
            font-weight: 500;
        }

        .toggle-icon {
            color: var(--text-secondary);
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .toggle-icon.open {
            transform: rotate(180deg);
        }

        .currency-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .currency-content.open {
            max-height: 500px;
            margin-top: 20px;
        }

        .option-group {
            margin-bottom: 20px;
        }

        .option-group label {
            display: block;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-item label {
            color: var(--text-primary);
            cursor: pointer;
            margin: 0;
            font-weight: normal;
            font-size: 0.9em;
        }

        /* Dashboard */
        .last-update {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 0.85em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .flip-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            transition: all 0.2s ease;
        }

        .flip-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .price {
            font-size: 1.8em;
            font-weight: 600;
            color: var(--text-primary);
            margin: 10px 0;
        }

        .change {
            font-size: 0.9em;
            font-weight: 500;
        }

        .change.positive {
            color: var(--positive-text);
        }

        .change.negative {
            color: var(--negative-text);
        }

        .change.neutral {
            color: var(--neutral-text);
        }

        .loading {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1em;
            padding: 40px;
        }

        .error, .success {
            padding: 12px;
            border-radius: 6px;
            margin: 20px 0;
            text-align: center;
            font-size: 0.9em;
        }

        .error {
            background: var(--card-bg);
            color: var(--negative-text);
            border: 1px solid var(--negative-text);
        }

        .success {
            background: var(--card-bg);
            color: var(--positive-text);
            border: 1px solid var(--positive-text);
        }

        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 24px;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: var(--border-color);
        }

        .icon {
            font-size: 1.3em;
        }

        .status {
            font-size: 0.75em;
            color: var(--text-muted);
            margin-top: 5px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading-pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Controls -->
        <div class="top-controls">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
            <button class="control-btn" onclick="showSettings()">Settings</button>
        </div>

        <!-- Setup Page -->
        <div id="setupPage" class="setup-page hidden">
            <h2>Dashboard Setup</h2>
            <p style="text-align: center; margin-bottom: 20px;">
                Configure your API keys
            </p>
            
            <h3 style="color: var(--text-primary); font-size: 1.1em; margin: 20px 0 10px 0;">Forex Provider</h3>
            <p style="color: var(--text-secondary); font-size: 0.9em; margin-bottom: 10px;">
                Choose which API to use for currency exchange rates
            </p>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px;">
                    <input type="radio" name="forexProvider" value="exchangerate" checked style="margin-right: 8px;">
                    <span style="color: var(--text-primary); font-weight: 500;">ExchangeRate-API</span>
                    <span style="color: var(--text-secondary); font-size: 0.85em; display: block; margin-left: 24px;">
                        Free: 1,500 requests/month • Forex only
                    </span>
                </label>
                <label style="display: block;">
                    <input type="radio" name="forexProvider" value="twelvedata" style="margin-right: 8px;">
                    <span style="color: var(--text-primary); font-weight: 500;">Twelve Data</span>
                    <span style="color: var(--text-secondary); font-size: 0.85em; display: block; margin-left: 24px;">
                        Free: 800 requests/day • Forex only (commodities need Alpha Vantage)
                    </span>
                </label>
            </div>

            <h3 style="color: var(--text-primary); font-size: 1.1em; margin: 20px 0 10px 0;">API Keys</h3>
            <p style="color: var(--text-secondary); font-size: 0.9em; margin-bottom: 15px;">
                Store all your API keys below. Only the selected provider will be used.
            </p>

            <div class="api-input-group">
                <label style="color: var(--text-secondary); font-size: 0.9em; display: block; margin-bottom: 5px;">
                    ExchangeRate-API Key
                    <a href="https://www.exchangerate-api.com/" target="_blank" style="margin-left: 8px; font-size: 0.85em;">(get key)</a>
                </label>
                <input 
                    type="text" 
                    id="exchangerateApiKeyInput" 
                    placeholder="Paste ExchangeRate-API key here"
                    style="margin-bottom: 15px;"
                />

                <label style="color: var(--text-secondary); font-size: 0.9em; display: block; margin-bottom: 5px;">
                    Twelve Data API Key (for forex only)
                    <a href="https://twelvedata.com/" target="_blank" style="margin-left: 8px; font-size: 0.85em;">(get key)</a>
                </label>
                <input 
                    type="text" 
                    id="twelvedataApiKeyInput" 
                    placeholder="Paste Twelve Data key here"
                    style="margin-bottom: 15px;"
                />

                <label style="color: var(--text-secondary); font-size: 0.9em; display: block; margin-bottom: 5px;">
                    Alpha Vantage API Key (required for commodities)
                    <a href="https://www.alphavantage.co/support/#api-key" target="_blank" style="margin-left: 8px; font-size: 0.85em;">(get key)</a>
                </label>
                <input 
                    type="text" 
                    id="alphavantageApiKeyInput" 
                    placeholder="Paste Alpha Vantage key here (needed for Gold, WTI, Brent)"
                />

                <button class="btn-primary" onclick="saveApiKeys()" style="margin-top: 20px;">
                    Start Dashboard
                </button>
            </div>

            <p style="color: var(--text-muted); font-size: 0.85em; text-align: center; margin-top: 20px;">
                All API keys are stored locally in your browser
            </p>
        </div>

        <!-- Main Dashboard -->
        <div id="mainDashboard" class="hidden">
            <!-- Currency Options -->
            <div class="currency-options">
                <div class="currency-header" onclick="toggleCurrencyMenu()">
                    <h3>Currency Pairs</h3>
                    <span class="toggle-icon" id="toggleIcon">▼</span>
                </div>
                
                <div class="currency-content" id="currencyContent">
                    <div class="option-group">
                        <label>Major Pairs</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_eur_usd" value="EUR/USD" checked>
                                <label for="pair_eur_usd">EUR/USD</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_gbp_usd" value="GBP/USD" checked>
                                <label for="pair_gbp_usd">GBP/USD</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_eur_gbp" value="EUR/GBP" checked>
                                <label for="pair_eur_gbp">EUR/GBP</label>
                            </div>
                        </div>
                    </div>

                    <div class="option-group">
                        <label>Other Major Currencies (dollars per currency)</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_jpy_usd" value="JPY/USD">
                                <label for="pair_jpy_usd">JPY/USD</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_chf_usd" value="CHF/USD">
                                <label for="pair_chf_usd">CHF/USD</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_aud_usd" value="AUD/USD">
                                <label for="pair_aud_usd">AUD/USD</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_cad_usd" value="CAD/USD">
                                <label for="pair_cad_usd">CAD/USD</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_nzd_usd" value="NZD/USD">
                                <label for="pair_nzd_usd">NZD/USD</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_cny_usd" value="CNY/USD">
                                <label for="pair_cny_usd">CNY/USD</label>
                            </div>
                        </div>
                    </div>

                    <div class="option-group">
                        <label>Commodities</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_gold" value="GOLD">
                                <label for="pair_gold">Gold</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_wti" value="WTI">
                                <label for="pair_wti">WTI Crude Oil</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="pair_brent" value="BRENT">
                                <label for="pair_brent">Brent Crude Oil</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn-primary" onclick="applySettings()" style="margin-top: 15px;">
                        Apply Settings
                    </button>
                </div>
            </div>

            <div id="last-update" class="last-update"></div>

            <div id="loading" class="loading loading-pulse" style="display: none;">
                Loading market data...
            </div>

            <div id="error" class="error" style="display: none;"></div>
            <div id="success" class="success" style="display: none;"></div>

            <div id="dashboard" class="grid"></div>

            <button class="refresh-btn" onclick="loadData()">Refresh Data</button>
        </div>
    </div>

    <script>
        // ============================================
        // PRELOADED API KEYS - EDIT THESE VALUES
        // ============================================
        // Paste your API keys between the quotes below
        // These will be used as defaults but can be changed via Settings
        const PRELOADED_KEYS = {
            exchangerate: '946da033c25dca04d7defc35',  // Your ExchangeRate-API key here
            twelvedata: '84de83cb0f8d4008ba259292a8417aea',    // Your Twelve Data API key here
            alphavantage: 'ZEIQ3WJD191Z2ICL',  // Your Alpha Vantage API key here
            provider: 'exchangerate'  // Default provider: 'exchangerate' or 'twelvedata'
        };
        // ============================================
        
        // Load API keys (preloaded values are used if nothing is saved in localStorage)
        let exchangerateApiKey = localStorage.getItem('exchangerateApiKey') || PRELOADED_KEYS.exchangerate;
        let twelvedataApiKey = localStorage.getItem('twelvedataApiKey') || PRELOADED_KEYS.twelvedata;
        let alphavantageApiKey = localStorage.getItem('alphavantageApiKey') || PRELOADED_KEYS.alphavantage;
        let forexProvider = localStorage.getItem('forexProvider') || PRELOADED_KEYS.provider;
        let theme = localStorage.getItem('theme') || 'light';
        let selectedPairs = JSON.parse(localStorage.getItem('selectedPairs') || '["EUR/USD", "GBP/USD", "EUR/GBP"]');
        let previousPrices = {};
        let menuOpen = false;
        let flippedPairs = {}; // Track which pairs are flipped

        const pairConfigs = {
            'EUR/USD': { from: 'EUR', to: 'USD', name: 'Euro / USD', type: 'forex' },
            'GBP/USD': { from: 'GBP', to: 'USD', name: 'GBP / USD', type: 'forex' },
            'EUR/GBP': { from: 'EUR', to: 'GBP', name: 'Euro / GBP', type: 'forex' },
            'JPY/USD': { from: 'JPY', to: 'USD', name: 'Japanese Yen / USD', type: 'forex' },
            'CHF/USD': { from: 'CHF', to: 'USD', name: 'Swiss Franc / USD', type: 'forex' },
            'AUD/USD': { from: 'AUD', to: 'USD', name: 'Australian Dollar / USD', type: 'forex' },
            'CAD/USD': { from: 'CAD', to: 'USD', name: 'Canadian Dollar / USD', type: 'forex' },
            'NZD/USD': { from: 'NZD', to: 'USD', name: 'New Zealand Dollar / USD', type: 'forex' },
            'CNY/USD': { from: 'CNY', to: 'USD', name: 'Chinese Yuan / USD', type: 'forex' },
            'GOLD': { symbol: 'XAU', name: 'Gold (USD/oz)', type: 'commodity', commoditySymbol: 'XAU' },
            'WTI': { symbol: 'WTI', name: 'WTI Crude Oil (USD/barrel)', type: 'commodity', commoditySymbol: 'WTIOIL' },
            'BRENT': { symbol: 'BRENT', name: 'Brent Crude Oil (USD/barrel)', type: 'commodity', commoditySymbol: 'BRENTOIL' }
        };

        function toggleCurrencyMenu() {
            menuOpen = !menuOpen;
            const content = document.getElementById('currencyContent');
            const icon = document.getElementById('toggleIcon');
            
            if (menuOpen) {
                content.classList.add('open');
                icon.classList.add('open');
            } else {
                content.classList.remove('open');
                icon.classList.remove('open');
            }
        }

        function flipPair(pairKey) {
            flippedPairs[pairKey] = !flippedPairs[pairKey];
            
            // Find the card data and redisplay
            const cards = Array.from(document.querySelectorAll('.card'));
            cards.forEach(card => {
                const titleElement = card.querySelector('.card-title');
                if (titleElement && titleElement.dataset.pairKey === pairKey) {
                    updateCardDisplay(card, pairKey);
                }
            });
        }

        function updateCardDisplay(card, pairKey) {
            const pair = pairConfigs[pairKey];
            const isFlipped = flippedPairs[pairKey];
            const originalPrice = parseFloat(card.dataset.originalPrice);
            
            if (isNaN(originalPrice)) return;
            
            let displayPrice, displayName;
            
            if (isFlipped) {
                // Flip: take reciprocal
                displayPrice = (1 / originalPrice).toFixed(4);
                displayName = `${pair.to} / ${pair.from}`;
            } else {
                // Normal display
                displayPrice = originalPrice.toFixed(4);
                displayName = pair.name;
            }
            
            card.querySelector('.card-title').textContent = displayName;
            card.querySelector('.price').textContent = displayPrice;
        }

        function toggleTheme() {
            theme = theme === 'light' ? 'dark' : 'light';
            applyTheme();
            localStorage.setItem('theme', theme);
        }

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', theme);
            const themeBtn = document.getElementById('themeToggle');
            themeBtn.textContent = theme === 'dark' ? '💡' : '🌙';
        }

        function showSettings() {
            // Update checkboxes based on current selection
            Object.keys(pairConfigs).forEach(pairKey => {
                const checkbox = document.getElementById(`pair_${pairKey.toLowerCase().replace('/', '_')}`);
                if (checkbox) {
                    checkbox.checked = selectedPairs.includes(pairKey);
                }
            });

            // Populate all API key inputs
            document.getElementById('exchangerateApiKeyInput').value = exchangerateApiKey;
            document.getElementById('twelvedataApiKeyInput').value = twelvedataApiKey;
            document.getElementById('alphavantageApiKeyInput').value = alphavantageApiKey;
            
            // Set forex provider radio button
            const providerRadio = document.querySelector(`input[name="forexProvider"][value="${forexProvider}"]`);
            if (providerRadio) {
                providerRadio.checked = true;
            }

            document.getElementById('mainDashboard').classList.add('hidden');
            document.getElementById('setupPage').classList.remove('hidden');
        }

        function applySettings() {
            // Collect selected pairs
            selectedPairs = [];
            Object.keys(pairConfigs).forEach(pairKey => {
                const checkbox = document.getElementById(`pair_${pairKey.toLowerCase().replace('/', '_')}`);
                if (checkbox && checkbox.checked) {
                    selectedPairs.push(pairKey);
                }
            });

            if (selectedPairs.length === 0) {
                alert('Please select at least one currency pair');
                return;
            }

            localStorage.setItem('selectedPairs', JSON.stringify(selectedPairs));
            
            document.getElementById('setupPage').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            
            // Close the menu after applying
            menuOpen = false;
            document.getElementById('currencyContent').classList.remove('open');
            document.getElementById('toggleIcon').classList.remove('open');
            
            loadData();
        }

        function saveApiKeys() {
            const exchangerateInput = document.getElementById('exchangerateApiKeyInput');
            const twelvedataInput = document.getElementById('twelvedataApiKeyInput');
            const alphavantageInput = document.getElementById('alphavantageApiKeyInput');
            const selectedProvider = document.querySelector('input[name="forexProvider"]:checked').value;
            
            // Get all API keys
            exchangerateApiKey = exchangerateInput.value.trim();
            twelvedataApiKey = twelvedataInput.value.trim();
            alphavantageApiKey = alphavantageInput.value.trim();
            forexProvider = selectedProvider;
            
            // Validate that we have at least the selected provider's key
            if (selectedProvider === 'exchangerate' && !exchangerateApiKey) {
                alert('Please enter an ExchangeRate-API key');
                return;
            }
            
            if (selectedProvider === 'twelvedata' && !twelvedataApiKey) {
                alert('Please enter a Twelve Data API key');
                return;
            }
            
            // Save all keys (even empty ones)
            localStorage.setItem('exchangerateApiKey', exchangerateApiKey);
            localStorage.setItem('twelvedataApiKey', twelvedataApiKey);
            localStorage.setItem('alphavantageApiKey', alphavantageApiKey);
            localStorage.setItem('forexProvider', forexProvider);
            
            applySettings();
        }

        async function loadData() {
            const dashboard = document.getElementById('dashboard');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const success = document.getElementById('success');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            success.style.display = 'none';

            try {
                const results = [];
                
                for (const pairKey of selectedPairs) {
                    const pair = pairConfigs[pairKey];
                    
                    try {
                        let rate, displayRate;
                        
                        if (pair.type === 'forex') {
                            // Fetch forex data using selected provider
                            if (forexProvider === 'exchangerate') {
                                // ExchangeRate-API
                                const url = `https://v6.exchangerate-api.com/v6/${exchangerateApiKey}/pair/${pair.from}/${pair.to}`;
                                const response = await fetch(url);
                                const data = await response.json();
                                
                                if (data.result === 'error') {
                                    throw new Error(data['error-type'] || 'API Error');
                                }
                                
                                rate = data.conversion_rate;
                                displayRate = rate.toFixed(4);
                                
                            } else if (forexProvider === 'twelvedata') {
                                // Twelve Data API
                                const symbol = `${pair.from}/${pair.to}`;
                                const url = `https://api.twelvedata.com/exchange_rate?symbol=${symbol}&apikey=${twelvedataApiKey}`;
                                const response = await fetch(url);
                                const data = await response.json();
                                
                                if (data.code && data.code !== 200) {
                                    throw new Error(data.message || 'API Error');
                                }
                                
                                if (data.rate) {
                                    rate = parseFloat(data.rate);
                                    displayRate = rate.toFixed(4);
                                } else {
                                    throw new Error('Invalid response from Twelve Data');
                                }
                            }
                            
                        } else if (pair.type === 'commodity') {
                            // Always use Alpha Vantage for commodities
                            if (!alphavantageApiKey) {
                                throw new Error('No Alpha Vantage API key configured');
                            }
                            
                            const symbol = pair.avSymbol;
                            
                            const response = await fetch(
                                `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${alphavantageApiKey}`
                            );
                            const data = await response.json();
                            
                            if (data['Global Quote'] && data['Global Quote']['05. price']) {
                                rate = parseFloat(data['Global Quote']['05. price']);
                                displayRate = rate.toFixed(2);
                            } else if (data['Note']) {
                                throw new Error('API limit reached (25/day)');
                            } else {
                                // Try fallback: currency exchange rate format
                                const fallbackUrl = `https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=${symbol}&to_currency=USD&apikey=${alphavantageApiKey}`;
                                const fallbackResponse = await fetch(fallbackUrl);
                                const fallbackData = await fallbackResponse.json();
                                
                                if (fallbackData['Realtime Currency Exchange Rate']) {
                                    rate = parseFloat(fallbackData['Realtime Currency Exchange Rate']['5. Exchange Rate']);
                                    displayRate = rate.toFixed(2);
                                } else {
                                    throw new Error('Unable to fetch commodity price from Alpha Vantage');
                                }
                            }
                        }
                        
                        // Calculate change
                        let changePercent = 0;
                        if (previousPrices[pairKey]) {
                            changePercent = ((rate - previousPrices[pairKey]) / previousPrices[pairKey] * 100).toFixed(2);
                        }
                        previousPrices[pairKey] = rate;
                        
                        results.push({
                            symbol: pairKey,
                            name: pair.name,
                            price: displayRate,
                            rawPrice: rate,
                            change: changePercent,
                            status: 'Live',
                            type: pair.type
                        });
                        
                        await new Promise(resolve => setTimeout(resolve, 150));
                        
                    } catch (err) {
                        console.error(`Error fetching ${pairKey}:`, err);
                        results.push({
                            symbol: pairKey,
                            name: pair.name,
                            price: 'N/A',
                            rawPrice: 0,
                            change: 0,
                            status: err.message || 'Error',
                            type: pair.type
                        });
                    }
                }
                
                displayData(results);
                updateTimestamp();
                
                success.textContent = 'Data updated successfully';
                success.style.display = 'block';
                setTimeout(() => success.style.display = 'none', 3000);
                
            } catch (err) {
                console.error('Error:', err);
                error.textContent = `Error: ${err.message}. Check your API keys in Settings.`;
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayData(data) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.originalPrice = item.rawPrice || item.price;
                card.dataset.pairKey = item.symbol;
                
                const change = parseFloat(item.change);
                const isPositive = change > 0;
                const isNegative = change < 0;
                const changeClass = isPositive ? 'positive' : isNegative ? 'negative' : 'neutral';
                
                const changeDisplay = change === 0 ? '—' : 
                    `${isPositive ? '▲' : '▼'} ${Math.abs(change)}%`;
                
                const isCommodity = item.type === 'commodity';
                const isFlipped = flippedPairs[item.symbol];
                let displayPrice, displayName;
                
                if (isCommodity) {
                    // Commodities don't flip
                    displayPrice = item.price;
                    displayName = item.name;
                } else {
                    const pair = pairConfigs[item.symbol];
                    
                    if (isFlipped) {
                        displayPrice = (1 / parseFloat(item.price)).toFixed(4);
                        displayName = `${pair.to} / ${pair.from}`;
                    } else {
                        displayPrice = item.price;
                        displayName = item.name;
                    }
                }
                
                const flipButton = isCommodity ? '' : 
                    `<button class="flip-btn" onclick="flipPair('${item.symbol}')" title="Flip exchange rate">⇄</button>`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="card-title" data-pair-key="${item.symbol}">${displayName}</div>
                        </div>
                        ${flipButton}
                    </div>
                    <div class="price">${displayPrice}</div>
                    <div class="change ${changeClass}">
                        ${changeDisplay}
                    </div>
                    <div class="status">${item.status}</div>
                `;
                
                dashboard.appendChild(card);
            });
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-update').textContent = 
                `Last updated: ${now.toLocaleTimeString()}`;
        }

        // Initialize on page load
        window.onload = function() {
            applyTheme();
            
            // Check if we have the selected provider's API key
            const hasRequiredKey = (forexProvider === 'exchangerate' && exchangerateApiKey) || 
                                   (forexProvider === 'twelvedata' && twelvedataApiKey);
            
            if (hasRequiredKey) {
                document.getElementById('mainDashboard').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('setupPage').classList.remove('hidden');
            }
        };

        // Auto-refresh every 5 minutes
        setInterval(() => {
            const hasRequiredKey = (forexProvider === 'exchangerate' && exchangerateApiKey) || 
                                   (forexProvider === 'twelvedata' && twelvedataApiKey);
                                   
            if (hasRequiredKey && !document.getElementById('mainDashboard').classList.contains('hidden')) {
                loadData();
            }
        }, 30 * 60 * 1000);
    </script>
</body>
</html>
